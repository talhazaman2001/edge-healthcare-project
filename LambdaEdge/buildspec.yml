version: 0.2

phases:
  install:
    commands:
      - echo "No dependencies to install for Lambda Edge"
  build:
    commands:
      - echo "Zipping Lambda Edge function"
      - zip -r Lambda-Greengrass-LSTM/greengrass_lstm.zip Lambda-Greengrass-LSTM/* -x Lambda-Greengrass-LSTM/appspec.yml
      - mv Lambda-Greengrass-LSTM/appspec.yml .
      
      - echo "Publishing new Lambda version..."
      - NEW_VERSION=$(aws lambda publish-version --function-name GreenGrassLSTMFunction --query 'Version' --output text) || { echo "Lambda version publish failed"; exit 1; }
      - echo "Published new version: $NEW_VERSION"
      
      - echo "Fetching current alias version..."
      - CURRENT_VERSION=$(aws lambda get-alias --function-name GreenGrassLSTMFunction --name live --query 'FunctionVersion' --output text)
      - echo "Updating appspec.yml with current and target versions..."
      - sed -i "s/CURRENT_VERSION_PLACEHOLDER/$CURRENT_VERSION/" Lambda-Greengrass-LSTM/appspec.yml
      - sed -i "s/TARGET_VERSION_PLACEHOLDER/$NEW_VERSION/" Lambda-Greengrass-LSTM/appspec.yml


artifacts:
  files:
    - Lambda-Greengrass-LSTM/greengrass_lstm.zip
    - appspec.yml  
