version: 0.2

phases:
  install:
    commands:
      - echo "No dependencies to install"

  build:
    commands:
      - echo "Adding appspec.yml to each Lambda zip..."
      - zip -g Lambda-Greengrass-Creation/greengrass_creation.zip appspec.yml
      - zip -g Lambda-Greengrass-LSTM/greengrass_LSTM.zip appspec.yml
      - zip -g Lambda-Neo-Compilation/lambda_sagemaker_neo.zip appspec.yml
      - zip -g Lambda-SageMaker-Training-Job/lambda_sagemaker.zip appspec.yml
      - zip -g Lambda-WebSocket/lambda_websocket.zip appspec.yml

artifacts:
  files:
    - Lambda-Greengrass-Creation/greengrass_creation.zip
    - Lambda-Greengrass-LSTM/greengrass_LSTM.zip
    - Lambda-Neo-Compilation/lambda_sagemaker_neo.zip
    - Lambda-SageMaker-Training-Job/lambda_sagemaker.zip
    - Lambda-WebSocket/lambda_websocket.zip
