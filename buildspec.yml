version: 0.2

phases:
  install:
    commands:
      - echo "No dependencies to install for Lambda Greengrass"
  build:
    commands:
      - echo "Zipping Lambda Greengrass function"
      - zip -r Lambda-Greengrass-Creation/greengrass_creation.zip Lambda-Greengrass-Creation/* -x Lambda-Greengrass-Creation/appspec.yml
      - mv Lambda-Greengrass-Creation/appspec.yml .
      - echo "Publishing new Lambda version"
      - NEW_VERSION=$(aws lambda publish-version --function-name lambda-greengrass-creation --query 'Version' --output text) || { echo "Lambda version publish failed"; exit 1; }
      - echo "Updating alias to point to new version"
      - aws lambda update-alias --function-name lambda-greengrass-creation --name live --function-version $NEW_VERSION || { echo "Alias update failed"; exit 1; }

artifacts:
  files:
    - Lambda-Greengrass-Creation/greengrass_creation.zip
    - appspec.yml  
