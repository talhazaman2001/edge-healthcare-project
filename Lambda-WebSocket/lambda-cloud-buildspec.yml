version: 0.2

phases:
  install:  
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies for Cloud Lambda..."
      - pip install --target ./package boto3

  build:
    commands:
      - echo "Packaging Lambda function for the Cloud..."
      - mkdir -p package  
      - cp -r Lambda-WebSocket/*.py ./package/ 
      - cp Lambda-WebSocket/appspec.yml .
      - cd package 
      - zip -r ../lambda_websocket_combined.zip .  
      - cd .. 
      - zip -g lambda_websocket_combined.zip appspec.yml
      - echo "Cloud Lambda package created."

artifacts:
  files:
    - lambda_websocket_combined.zip 

cache:
  paths:
    - ./package/**
