version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies for Greengrass Lambda..."
      - pip install --target ./package boto3  

  build:
    commands:
      - echo "Packaging the Greengrass creation Lambda function..."
      - mkdir -p package  
      - cp -r Lambda-Greengrass-Creation/*.py ./package/
      - cd package 
      - zip -r greengrass_creation_combined.zip ./*
      - cd ..
      - zip -g greengrass_creation_combined.zip appspec.yml
      - echo "Lambda Greengrass Creation with AppSpec file created."

artifacts:
  files:
    - greengrass_creation_combined.zip  

cache:
  paths:
    - ./package/**
