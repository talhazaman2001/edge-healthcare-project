version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "No dependencies to install"

  build:
    commands:
      - echo "Adding appspec.yml to the existing Lambda zip..."
      # Add appspec.yml to the existing lambda_sagemaker.zip
      - zip -g lambda_sagemaker.zip appspec.yml
      - echo "AppSpec file successfully added to Lambda zip."

artifacts:
  files:
    - lambda_sagemaker.zip
