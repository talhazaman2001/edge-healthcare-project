version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies for Lambda SageMaker Training..."
      - pip install --target ./package boto3  
  build:
    commands:
      - echo "Packaging Lambda function for SageMaker training job..."
      - mkdir -p package  
      - cp -r Lambda-SageMaker-Training-Job/*.py ./package/  
      - cp Lambda-SageMaker-Training-Job/lambda-sagemaker-training-appspec.yml .
      - cd package
      - zip -r ../lambda_sagemaker_combined.zip .  
      - cd ..
      - zip -g lambda_sagemaker_combined.zip lambda-sagemaker-training-appspec.yml
      - echo "Lambda Sagemaker Training with AppSpec file created"
artifacts:
  files:
    - lambda_sagemaker_combined.zip  

cache:
  paths:
    - ./package/**
