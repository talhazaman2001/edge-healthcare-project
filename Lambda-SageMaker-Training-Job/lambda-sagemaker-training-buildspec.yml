version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "No dependencies to install"

  build:
    commands:
      - echo "Adding appspec.yml to the existing Lambda zip..."
      # Add appspec.yml to the existing lambda_sagemaker.zip
      - - if [ -f Lambda-SageMaker-Training-Job/lambda_sagemaker.zip ]; then zip -g Lambda-SageMaker-Training-Job/lambda_sagemaker.zip Lambda-SageMaker-Training-Job/appspec.yml; else echo "Zip file not found!"; exit 1; fi
      - echo "AppSpec file successfully added to Lambda zip."

artifacts:
  files:
    - lambda_sagemaker.zip
