version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies for Lambda SageMaker Neo Compilation..."
      - pip install --target ./package boto3  
  build:
    commands:
      - echo "Packaging Lambda function for SageMaker Neo compilation job..."
      - mkdir -p package  
      - cp -r Lambda-Neo-Compilation/*.py ./package/  
      - cd package
      - zip -r lambda_sagemaker_neo_combined.zip ./*
      - cd ..
      - zip -g lambda_sagemaker_neo_combined.zip appspec.yml
      - echo "Lambda Neo Compilation pacakge with AppSpec file created."
artifacts:
  files:
    - lambda_sagemaker_neo_combined.zip

cache:
  paths:
    - ./package/**
