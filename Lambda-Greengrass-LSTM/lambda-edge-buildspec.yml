version: 0.2

phases:
  install:  
    runtime-versions:
      python: 3.9
    commands:
      - echo "No dependencies to install"

  build:
    commands:
      - echo "Adding appspec.yml to the existing Lambda zip..."
      # Add appspec.yml to the existing greengrass_lstm.zip
      - - if [ -f Lambda-Greengrass-LSTM/greengrass_lstm.zip ]; then zip -g Lambda-Greengrass-LSTM/greengrass_lstm.zip Lambda-Greengrass-LSTM/appspec.yml; else echo "Zip file not found!"; exit 1; fi
      - echo "AppSpec file successfully added to Lambda zip."

artifacts:
  files:
    - greengrass_lstm.zip