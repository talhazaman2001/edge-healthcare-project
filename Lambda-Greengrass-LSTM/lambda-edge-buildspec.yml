version: 0.2

phases:
  install:  
    runtime-versions:
      python: 3.9
    commands:
      - echo "No dependencies to install"

  build:
    commands:
      - echo "Adding appspec.yml to the existing Lambda zip..."
      # Add appspec.yml to the existing greengrass_lstm.zip
      - zip -g greengrass_lstm.zip appspec.yml
      - echo "AppSpec file successfully added to Lambda zip."

artifacts:
  files:
    - greengrass_lstm.zip