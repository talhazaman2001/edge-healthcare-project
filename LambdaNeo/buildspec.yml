version: 0.2

phases:
  install:
    commands:
      - echo "No dependencies to install for Lambda Neo"
  build:
    commands:
      - echo "Zipping Lambda Neo function"
      - zip -r Lambda-Neo-Compilation/lambda_sagemaker_neo.zip Lambda-Neo-Compilation/* -x Lambda-Neo-Compilation/appspec.yml
      - mv Lambda-Neo-Compilation/appspec.yml .
      
      - echo "Publishing new Lambda version..."
      - NEW_VERSION=$(aws lambda publish-version --function-name sagemaker-neo-compilation-job --query 'Version' --output text) || { echo "Lambda version publish failed"; exit 1; }
      
      - echo "Fetching current alias version..."
      - CURRENT_VERSION=$(aws lambda get-alias --function-name sagemaker-neo-compilation-job --name live --query 'FunctionVersion' --output text)
      - echo "Updating appspec.yml with current and target versions..."
      - sed -i "s/CURRENT_VERSION_PLACEHOLDER/$CURRENT_VERSION/" Lambda-Neo-Compilation/appspec.yml
      - sed -i "s/TARGET_VERSION_PLACEHOLDER/$NEW_VERSION/" Lambda-Neo-Compilation/appspec.yml

artifacts:
  files:
    - Lambda-Neo-Compilation/lambda_sagemaker_neo.zip
    - appspec.yml  
