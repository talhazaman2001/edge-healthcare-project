version: 0.2

phases:
  install:
    commands:
      - echo "No dependencies to install for Lambda Cloud"
  build:
    commands:
      - echo "Zipping Lambda Cloud function"
      - zip -r Lambda-WebSocket/lambda_websocket.zip Lambda-WebSocket/* -x Lambda-WebSocket/appspec.yml
      - mv Lambda-WebSocket/appspec.yml .

artifacts:
  files:
    - Lambda-WebSocket/lambda_websocket.zip
    - appspec.yml  
